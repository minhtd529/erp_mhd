run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - revive
    - misspell
    - gocritic

linters-settings:
  goimports:
    local-prefixes: github.com/mdh/erp-audit

issues:
  exclude-rules:
    - path: "_test.go"
      linters:
        - errcheck
  max-issues-per-linter: 50
  max-same-issues: 10
