apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: erp-audit-staging

bases:
  - ../../base

namePrefix: staging-

patches:
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment
      name: erp-audit-api
  - patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 1
      - op: replace
        path: /spec/maxReplicas
        value: 3
    target:
      kind: HorizontalPodAutoscaler
      name: erp-audit-api
  - patch: |-
      - op: replace
        path: /spec/rules/0/host
        value: api-staging.erp-audit.example.com
      - op: replace
        path: /spec/tls/0/hosts/0
        value: api-staging.erp-audit.example.com
    target:
      kind: Ingress
      name: erp-audit-api

configMapGenerator:
  - name: erp-audit-api-config
    behavior: merge
    literals:
      - ENV=staging
