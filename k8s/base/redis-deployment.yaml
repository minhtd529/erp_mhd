apiVersion: apps/v1
kind: Deployment
metadata:
  name: erp-audit-redis
  namespace: erp-audit
  labels:
    app: erp-audit-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: erp-audit-redis
  template:
    metadata:
      labels:
        app: erp-audit-redis
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
      containers:
        - name: redis
          image: redis:7-alpine
          args: ["--save", "60", "1", "--loglevel", "warning"]
          ports:
            - name: redis
              containerPort: 6379
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: redis-data
              mountPath: /data
      volumes:
        - name: redis-data
          persistentVolumeClaim:
            claimName: erp-audit-redis-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: erp-audit-redis-pvc
  namespace: erp-audit
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: erp-audit-redis
  namespace: erp-audit
  labels:
    app: erp-audit-redis
spec:
  type: ClusterIP
  selector:
    app: erp-audit-redis
  ports:
    - name: redis
      port: 6379
      targetPort: redis
