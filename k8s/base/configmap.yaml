apiVersion: v1
kind: ConfigMap
metadata:
  name: erp-audit-api-config
  namespace: erp-audit
data:
  ENV: "production"
  PORT: "8080"
  APP_NAME: "erp-audit-api"
  DB_MAX_CONNS: "25"
  DB_MIN_CONNS: "5"
  DB_MAX_IDLE_TIME: "15m"
  MINIO_BUCKET: "erp-audit"
  MINIO_USE_SSL: "true"
  JWT_ACCESS_TTL_MINUTES: "15"
  JWT_REFRESH_TTL_DAYS: "7"
  TOTP_CHALLENGE_TTL_SECS: "300"
  TOTP_MAX_ATTEMPTS: "5"
  TOTP_TRUST_DEVICE_DAYS: "30"
  TOTP_MAX_TRUSTED_DEVICES: "5"
  TOTP_ISSUER: "ERP Audit"
