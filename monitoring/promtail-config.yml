server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Scrape API container logs from Docker
  - job_name: erp-audit-api
    static_configs:
      - targets:
          - localhost
        labels:
          job: erp-audit-api
          env: development
          __path__: /var/log/erp-audit/*.log

  # Docker container logs (when running under docker-compose)
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: label
            values: ["com.docker.compose.project=erp-audit"]
    relabel_configs:
      - source_labels: [__meta_docker_container_name]
        target_label: container
      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        target_label: service
