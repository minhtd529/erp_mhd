groups:
  - name: erp-audit-api
    interval: 30s
    rules:
      # High error rate (>5% 5xx responses)
      - alert: HighErrorRate
        expr: |
          sum(rate(erp_audit_http_requests_total{status=~"5.."}[5m]))
          /
          sum(rate(erp_audit_http_requests_total[5m])) > 0.05
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "High HTTP 5xx error rate"
          description: "Error rate is {{ $value | humanizePercentage }} over the last 5 minutes."

      # High latency (P95 > 500ms — matches the SLA target)
      - alert: HighLatency
        expr: |
          histogram_quantile(0.95,
            sum(rate(erp_audit_http_request_duration_seconds_bucket[5m])) by (le, path)
          ) > 0.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "API P95 latency above 500ms"
          description: "P95 latency for {{ $labels.path }} is {{ $value }}s."

      # API is down
      - alert: APIDown
        expr: up{job="erp-audit-api"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "ERP Audit API is down"
          description: "The API has been unreachable for more than 1 minute."

      # Many requests in-flight (potential lock-up)
      - alert: HighInflightRequests
        expr: erp_audit_http_requests_in_flight > 100
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Too many in-flight requests"
          description: "{{ $value }} requests currently in-flight — possible slow queries or deadlock."

  - name: database
    interval: 60s
    rules:
      # PostgreSQL exporter: too many active connections
      - alert: PostgresHighConnections
        expr: pg_stat_activity_count > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "PostgreSQL high connection count"
          description: "{{ $value }} active connections."

      # Redis memory usage > 80%
      - alert: RedisHighMemory
        expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis memory usage above 80%"
          description: "Redis is using {{ $value | humanizePercentage }} of its max memory."
