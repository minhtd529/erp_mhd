version: '3.9'

services:
  # ─── PostgreSQL 16 ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: erp_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: erp
      POSTGRES_PASSWORD: erp
      POSTGRES_DB: erp_audit
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U erp -d erp_audit"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - erp_net

  # ─── Redis 7 ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: erp_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ""
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - erp_net

  # ─── MinIO (S3-compatible object storage) ───────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: erp_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # API
      - "9001:9001"   # Console UI
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - erp_net

  # ─── MinIO bucket init (runs once) ─────────────────────────────────────────
  minio-init:
    image: minio/mc:latest
    container_name: erp_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/erp-audit &&
        mc anonymous set none local/erp-audit &&
        echo 'MinIO bucket ready'
      "
    networks:
      - erp_net

  # ─── NATS (message queue) ───────────────────────────────────────────────────
  nats:
    image: nats:2.10-alpine
    container_name: erp_nats
    restart: unless-stopped
    command: ["-js", "-m", "8222"]
    ports:
      - "4222:4222"   # NATS client
      - "8222:8222"   # HTTP monitoring
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - erp_net

  # ─── API (Go) — for `make dev` integration ──────────────────────────────────
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
      target: development
    container_name: erp_api
    restart: unless-stopped
    environment:
      ENV: development
      PORT: "8080"
      DATABASE_URL: postgres://erp:erp@postgres:5432/erp_audit?sslmode=disable  # internal docker network uses container port
      REDIS_URL: redis://redis:6379/0  # internal docker network uses container port
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: erp-audit
      MINIO_USE_SSL: "false"
      JWT_SECRET: dev-secret-change-in-production
    ports:
      - "8080:8080"
    volumes:
      - ./apps/api:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - erp_net
    profiles:
      - full

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  erp_net:
    driver: bridge
